<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忠县消防专职消防员招录心理潜质与职业适配度测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "Microsoft YaHei", sans-serif; }
        :root {
            --primary: #e63946;
            --primary-dark: #c41e3a;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
            --bg-color: #f8f9fa;
            --border: #edf2f4;
        }

        body { background: linear-gradient(135deg, #1d3557 0%, #457b9d 100%); min-height: 100vh; padding: 15px; display: flex; justify-content: center; align-items: flex-start; }
        .container { background: white; width: 100%; max-width: 900px; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); overflow: hidden; margin-top: 20px; margin-bottom: 20px;}
        
        .header { background: var(--primary); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 8px; letter-spacing: 1px; }
        .header p { font-size: 14px; opacity: 0.9; }

        .content { padding: 40px 30px; }
        .screen { display: none; animation: fadeIn 0.4s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 表单样式 */
        .info-card { background: #f1faee; border-left: 5px solid #2a9d8f; padding: 20px; border-radius: 0 8px 8px 0; margin-bottom: 30px; }
        .info-card p { color: #1d3557; font-size: 14px; margin-bottom: 8px; font-weight: 500;}
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 14px; font-weight: bold; color: var(--text-main); margin-bottom: 8px; }
        .form-control { padding: 12px 15px; border: 2px solid var(--border); border-radius: 8px; font-size: 15px; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary); outline: none; }
        .full-width { grid-column: 1 / -1; }

        .btn { background: var(--primary); color: white; border: none; padding: 14px 30px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; width: 100%; display: block; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230,57,70,0.3); }
        .btn-outline { background: white; color: var(--text-muted); border: 2px solid var(--border); }
        .btn-outline:hover { background: var(--bg-color); color: var(--text-main); transform: none; box-shadow: none;}

        /* 测试区域 */
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border); }
        .timer { font-size: 20px; font-weight: bold; color: var(--primary); }
        .progress-text { font-size: 14px; color: var(--text-muted); font-weight: bold; }
        
        .question-box { min-height: 250px; }
        .q-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; background: #e7f5ff; color: #1864ab; }
        .q-text { font-size: 19px; color: var(--text-main); font-weight: 600; margin-bottom: 25px; line-height: 1.6; }
        .q-math { font-size: 28px; font-weight: 800; color: #2b2d42; text-align: center; background: #f8f9fa; padding: 25px; border-radius: 10px; margin-bottom: 25px; letter-spacing: 2px;}

        .opt-list { display: grid; gap: 12px; }
        .opt-item { padding: 16px 20px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 16px; color: var(--text-main); display: flex; align-items: center;}
        .opt-item:hover { border-color: var(--primary); background: #fff5f5; }
        .opt-item.active { border-color: var(--primary); background: #ffe5e5; font-weight: bold; box-shadow: 0 4px 10px rgba(230,57,70,0.1);}
        .opt-item input { margin-right: 12px; accent-color: var(--primary); transform: scale(1.2);}

        .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 35px; }

        /* 结果评估区域 */
        .res-card { text-align: center; padding: 40px 20px; border-radius: 12px; margin-bottom: 30px; color: white; }
        .pass { background: linear-gradient(135deg, #2b8a3e, #08a045); }
        .fail { background: linear-gradient(135deg, #c92a2a, #e03131); }
        .res-title { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        
        .res-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .res-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: var(--bg-color); border-radius: 8px; border-left: 4px solid var(--primary); }
        .res-label { font-weight: 600; color: var(--text-main); }
        .res-val { font-weight: 800; font-size: 18px; }
        
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>心理潜质与职业适配度测试</h1>
        <p>基于隐喻投射心理学模型，挖掘真实性格底色</p>
    </div>

    <div class="content">
        <div class="screen active" id="screen-welcome">
            <div class="info-card">
                <p>⚠️ 郑重声明：</p>
                <p>1. 本系统引入防伪装测试，系统将通过“生活习惯隐喻”判断您的真实性格。凭第一直觉作答即可，刻意猜测所谓“好答案”将导致成绩被判定为【伪装无效】。</p>
                <p>2. 诚信机制：每个身份证号一生仅限作答一次，请认真对待。</p>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>真实姓名 *</label>
                    <input type="text" id="ipt-name" class="form-control" placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label>联系电话 *</label>
                    <input type="tel" id="ipt-phone" class="form-control" placeholder="11位手机号" maxlength="11">
                </div>
                <div class="form-group full-width">
                    <label>身份证号码 *</label>
                    <input type="text" id="ipt-id" class="form-control" placeholder="18位身份证号码" maxlength="18">
                </div>
            </div>
            <button class="btn" onclick="startTest()">承诺本人作答，开始测试</button>
        </div>

        <div class="screen" id="screen-test">
            <div class="status-bar">
                <div class="progress-text">进度: <span id="txt-prog" style="color:var(--primary);font-size:18px;">1/70</span></div>
                <div class="timer" id="txt-time">30:00</div>
            </div>
            <div class="question-box" id="q-box">
                </div>
            <div class="nav-buttons">
                <button class="btn btn-outline" id="btn-prev" onclick="goPrev()">上一题</button>
                <button class="btn" id="btn-next" onclick="goNext()">下一题</button>
            </div>
        </div>

        <div class="screen" id="screen-result">
            <div class="res-card" id="res-banner">
                <div class="res-title" id="res-status">评估中...</div>
                <div style="font-size: 16px; opacity: 0.9;" id="res-desc">正在生成深度性格画像</div>
            </div>

            <div class="res-grid">
                <div class="res-item" style="border-left-color: #fca311;">
                    <span class="res-label">🕵️ 答题真实度 (防伪装检测)</span>
                    <span class="res-val" id="val-lie" style="color: #fca311;">检测中</span>
                </div>
                <div class="res-item" style="border-left-color: #e63946;">
                    <span class="res-label">🚨 极端情绪与压力红线</span>
                    <span class="res-val" id="val-red" style="color: #e63946;">检测中</span>
                </div>
                <div class="res-item" style="border-left-color: #2a9d8f;">
                    <span class="res-label">🛡️ 纪律与规则意识潜质</span>
                    <span class="res-val" id="val-disc" style="color: #2a9d8f;">计算中</span>
                </div>
                <div class="res-item" style="border-left-color: #457b9d;">
                    <span class="res-label">🧠 潜意识职业性格 (MBTI)</span>
                    <span class="res-val" id="val-mbti" style="color: #457b9d;">计算中</span>
                </div>
                <div class="res-item" style="border-left-color: #6c757d;">
                    <span class="res-label">🧮 基础抗干扰算数正确率</span>
                    <span class="res-val" id="val-math" style="color: #6c757d;">0/10</span>
                </div>
            </div>
            <button class="btn" style="margin-top: 30px;" onclick="downloadData()">📥 导出政工专用研判报告</button>
        </div>
    </div>
</div>

<script>
// ==========================================
// 核心题库：全面采用投射测验与侧面隐喻设计
// 题量：精心设计的70道不重复题库（60道心理/投射题 + 10道数学题）
// ==========================================
const psychPool = [
    // --- 测谎与专注度 (6题) ---
    { id: 1, text: "我从小到大，脑海里从来没有闪过哪怕一次放弃的念头。", cat: "lie", opts: ["完全不符合", "不太符合", "不确定", "比较符合", "完全符合"], scores: [0,0,0,1,1] },
    { id: 2, text: "我这一生中，从未对任何人说过一句谎话，哪怕是善意的谎言。", cat: "lie", opts: ["完全不符合", "不太符合", "不确定", "比较符合", "完全符合"], scores: [0,0,0,1,1] },
    { id: 3, text: "即使别人故意激怒我、羞辱我，我也从来不会有一丝一毫的生气。", cat: "lie", opts: ["完全不符合", "不太符合", "不确定", "比较符合", "完全符合"], scores: [0,0,0,1,1] },
    { id: 4, text: "我从来没有在背后抱怨过任何制度或任何人的不好。", cat: "lie", opts: ["完全不符合", "不太符合", "不确定", "比较符合", "完全符合"], scores: [0,0,0,1,1] },
    { id: 5, text: "【系统检测】为了证明您在专注答题，请直接选择“不太符合”。", cat: "att", opts: ["完全不符合", "不太符合", "不确定", "比较符合", "完全符合"], correct: 1 },
    { id: 6, text: "【系统检测】这也是一道注意力测试题，请直接选择“比较符合”。", cat: "att", opts: ["完全不符合", "不太符合", "不确定", "比较符合", "完全符合"], correct: 3 },

    // --- 纪律与服从投射 (隐喻题，14题，满分70分) ---
    // 侧面测试：重规则 vs 随性
    { id: 101, text: "您在网上购买了一套结构非常复杂的拼装家具，拆开包装后，您的习惯是：", cat: "disc", opts: ["先把说明书从头到尾看一遍，清点完所有零件再动手", "边看图纸边找零件，遇到不懂的再翻说明书", "不看说明书，直接按自己的直觉拼，拼错了再拆"], scores: [5,2,0] },
    { id: 102, text: "如果您要为自己规划一次为期5天的长途旅行，您的计划方式更像：", cat: "disc", opts: ["精确到每天去哪、几点吃饭、车票酒店提前订好", "定个大概目的地和必去景点，其他的走到哪算哪", "完全不计划，买张票直接走，追求未知"], scores: [5,2,0] },
    { id: 103, text: "平时在家打扫卫生，如果发现衣柜背后有个极其隐蔽、平时根本看不见的死角有灰尘：", cat: "disc", opts: ["觉得心里不舒服，必须想办法把它彻底清理干净", "反正平时看不见，大扫除的时候再管", "假装没看见，只要外面干净就行"], scores: [5,2,0] },
    { id: 104, text: "您的手机桌面APP图标，平时的排列状态通常是：", cat: "disc", opts: ["严格按照功能或颜色分类，放进不同的文件夹里", "常用的放在首页，不常用的随便堆在后面", "完全无序，找软件全靠搜索功能"], scores: [5,2,0] },
    { id: 105, text: "在一场团队网络游戏中，队长下达了一个你认为胜算极低的战术指令，此时：", cat: "disc", opts: ["不管输赢，坚决执行队长的战术，保证团队步调一致", "嘴上答应，但行动时偷偷掺杂自己的想法", "直接开麦反驳，要求大家按自己的聪明想法打"], scores: [5,1,0] },
    { id: 106, text: "过马路时，面对红灯但左右完全没有车辆和摄像头，您的下意识行为是：", cat: "disc", opts: ["坚决等待绿灯亮起，哪怕站着发呆", "观察确信安全后，快速走过去", "跟着其他闯红灯的人一起过去"], scores: [5,1,0] },
    { id: 107, text: "如果您被分配去负责一个仓库的物资登记，面对繁琐的出入库表格：", cat: "disc", opts: ["拿一支笔、拿一根尺子，横平竖直地严格记录每一笔", "差不多记录个大概数量就行，没人细看", "觉得太麻烦，凭脑子记，月底随便编一下应付交差"], scores: [5,1,0] },
    { id: 108, text: "去参加一个并非很重要的朋友聚会，约定的时间是晚上6点，您通常会：", cat: "disc", opts: ["提前10分钟到达现场", "刚好6点左右到", "晚到十几分钟无所谓"], scores: [5,2,0] },
    { id: 109, text: "当你正在看一部极其精彩的悬疑电影大结局，突然接到了单位的一个非紧急通知电话：", cat: "disc", opts: ["立刻暂停电影，集中注意力接听并记录", "一边眼睛盯着屏幕，一边嘴里“嗯嗯”应付", "直接按掉，等看完电影再回拨过去"], scores: [5,1,0] },
    { id: 110, text: "对于“无规矩不成方圆”这句话，您内心的真实感触是：", cat: "disc", opts: ["深以为然，规则是社会高效运转的唯一基石", "有一定道理，但规矩有时候太死板，需要变通", "认为这句话是用来限制人的工具，很反感"], scores: [5,2,0] },
    { id: 111, text: "做饭时，如果菜谱上写着“加入盐5克、酱油10毫升”：", cat: "disc", opts: ["会刻意去找量勺，尽量做到精准", "凭感觉随便倒一点，尝尝咸淡再加", "完全不看菜谱，想怎么放怎么放"], scores: [5,2,0] },
    { id: 112, text: "如果在路上捡到一个装有少量现金但没有证件的旧钱包：", cat: "disc", opts: ["交到附近的警察局或失物招领处", "留在原地不管", "拿走里面的现金把钱包扔了"], scores: [5,2,0] },
    { id: 113, text: "面对一份有着严格排版要求（字体大小、行距）的报告文件：", cat: "disc", opts: ["在写字前就先设置好所有格式，严格按照模板来", "先随便写完，最后再统一调整格式", "差不多就行了，内容才是最重要的"], scores: [5,3,1] },
    { id: 114, text: "当您发现一个可以轻易绕过系统限制而不被发现的捷径时，您会：", cat: "disc", opts: ["拒绝使用，因为这不符合合规流程", "如果能提高效率就用一下，反正没人知道", "经常寻找这种捷径来偷懒"], scores: [5,1,0] },

    // --- 压力与情绪红线投射 (隐喻题，15题，反向计分，0分触发预警) ---
    // 侧面测试：冲动控制、抗压能力、创伤倾向
    { id: 201, text: "看着耳机线死死地缠绕打结成一团，您身体本能的第一反应是：", cat: "red", opts: ["深吸一口气，从线头开始慢慢理顺", "觉得有些麻烦，但还是能解开", "瞬间觉得胸口发闷、极其烦躁，甚至想拿剪刀剪断"], scores: [5,3,0] },
    { id: 202, text: "在一款带有紧张倒计时音效的电脑游戏中，时间快结束时您的生理状态：", cat: "red", opts: ["精神高度集中，手速变快，反而有些兴奋", "比较紧张，但还能操作", "心跳极快，手指发抖僵硬，大脑一片空白，甚至想直接关掉游戏"], scores: [5,3,0] },
    { id: 203, text: "如果有人在公共场合，仅仅因为误会而对您大声斥责指着您的鼻子骂：", cat: "red", opts: ["冷静地向周围人解释情况，不和对方对骂", "很生气，大声和他争辩回去", "控制不住情绪，立刻上前推搡对方甚至想动手打人"], scores: [5,2,0] },
    { id: 204, text: "看一部以悲剧结尾、极度压抑的电影后，您的状态通常是：", cat: "red", opts: ["感叹一下剧情，一两个小时后就彻底出戏了", "心情沉重半天左右", "连续好几天情绪低落，觉得人生毫无意义，甚至严重影响睡眠"], scores: [5,3,0] },
    { id: 205, text: "在拥挤的公交车上，有人重重踩了您一脚却完全没有道歉：", cat: "red", opts: ["提醒对方注意一下，就算了", "心里暗骂一句，但忍住了", "立刻火冒三丈，狠狠踩回去或者破口大骂"], scores: [5,3,0] },
    { id: 206, text: "如果在短视频里突然刷到极其血腥、器官外露的真实车祸画面，您的生理反应：", cat: "red", opts: ["觉得比较惨，迅速划走", "感到不适，皱起眉头", "瞬间头晕目眩、恶心想吐，甚至长时间不敢闭眼睡觉"], scores: [5,3,0] },
    { id: 207, text: "当您为了一个项目连续熬夜三天，极度疲惫时，电脑突然死机文件没保存：", cat: "red", opts: ["叹口气，喝口冷水，尝试重启找回文件", "非常沮丧，抱怨几句", "彻底崩溃，抓狂地猛砸键盘或鼠标，甚至想毁掉电脑"], scores: [5,3,0] },
    { id: 208, text: "对于高处（如站在五层楼没有任何护栏的天台边缘往下看）：", cat: "red", opts: ["有点忌惮，但只要小心点觉得可以接受", "觉得腿发软，不敢靠近边缘", "只要想到那个画面就手心出汗、呼吸困难，绝对不可能去"], scores: [5,2,0] },
    { id: 209, text: "半夜一个人走在没有路灯、只有风声的陌生树林里，您的感觉：", cat: "red", opts: ["保持警惕，加快脚步走出去", "有点害怕，但能控制住情绪", "陷入极度恐慌，幻想各种怪物，甚至吓得不敢动弹"], scores: [5,3,0] },
    { id: 210, text: "遇到一点生活中的小挫折（如错过了最后一班车）时，您的内心独白更偏向：", cat: "red", opts: ["“真倒霉，赶紧查查其他路线吧”", "“烦死了，今天怎么事事不顺”", "“我真是个没用的人，活着就是一种受罪”"], scores: [5,3,0] },

// 严格不重复的抽样算法
function sampleUnique(arr, count) {
    let copy = [...arr];
    let res = [];
    while(res.length < count && copy.length > 0) {
        let r = Math.floor(Math.random() * copy.length);
        res.push(copy.splice(r, 1)[0]);
    }
    return res;
}

// 组装70题试卷
function generatePaper() {
    let lies = sampleUnique(psychPool.filter(q=>q.cat === "lie"), 4); 
    let atts = sampleUnique(psychPool.filter(q=>q.cat === "att"), 2);
    let discs = sampleUnique(psychPool.filter(q=>q.cat === "disc"), 14);
    let reds = sampleUnique(psychPool.filter(q=>q.cat === "red"), 15);
    let mbtis = sampleUnique(psychPool.filter(q=>q.cat === "mbti"), 25);
    
    // 心理题混合打乱 (60题)
    let pPart = sampleUnique([...lies, ...atts, ...discs, ...reds, ...mbtis], 60);
    // 算数题打乱 (10题)
    let mPart = sampleUnique(mathPool, 10);
    
    // 保证正好70题
    return [...pPart, ...mPart];
}

function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startTest() {
    let name = document.getElementById('ipt-name').value.trim();
    let phone = document.getElementById('ipt-phone').value.trim();
    let idStr = document.getElementById('ipt-id').value.trim();

    if(!name || !/^1[3-9]\d{9}$/.test(phone) || !/^\d{17}[\dXx]$/.test(idStr)) {
        alert("请输入真实有效的姓名、11位手机号和18位身份证号码！");
        return;
    }

    // 核心锁死：防二次答题
    if(localStorage.getItem('xf_tested_' + idStr)) {
        alert("⚠️ 系统检测到该身份证号已参与过测试！为保证公平，每人终生仅限作答一次。");
        return;
    }

    userInfo = { name, phone, idStr };
    questions = generatePaper();
    answers = new Array(70).fill(null);

    switchScreen('screen-test');
    
    timerObj = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('txt-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
        if(timeLeft <= 0) { clearInterval(timerObj); calcRes(); }
    }, 1000);

    renderQ();
}

function renderQ() {
    const q = questions[currIdx];
    const box = document.getElementById('q-box');
    let isMath = q.opts ? false : true;

    let tag = isMath ? "基础抗干扰运算" : "情境隐喻测试";
    let cssText = isMath ? "q-math" : "q-text";
    let optsArray = isMath ? q.opts : q.opts;

    box.innerHTML = `
        <div class="q-tag">${tag}</div>
        <div class="${cssText}">${q.text}</div>
        <div class="opt-list">
            ${optsArray.map((opt, i) => `
                <div class="opt-item ${answers[currIdx] === i ? 'active' : ''}" onclick="selectOpt(${i})">
                    <input type="radio" ${answers[currIdx] === i ? 'checked' : ''}>
                    <span>${opt}</span>
                </div>
            `).join('')}
        </div>
    `;

    document.getElementById('txt-prog').textContent = `${currIdx + 1}/70`;
    document.getElementById('btn-prev').style.visibility = currIdx === 0 ? 'hidden' : 'visible';
    document.getElementById('btn-next').textContent = currIdx === 69 ? "提交试卷" : "下一题";
}

function selectOpt(idx) {
    answers[currIdx] = idx;
    renderQ();
}

function goPrev() { if(currIdx > 0) { currIdx--; renderQ(); } }
function goNext() {
    if(currIdx === 69) {
        if(answers.includes(null)) {
            if(!confirm("⚠️ 您还有未作答的题目，强制交卷可能被判定为不合格。确认交卷吗？")) return;
        } else {
            if(!confirm("确认提交试卷吗？交卷后将无法再次修改和测试。")) return;
        }
        clearInterval(timerObj);
        
        // 记录本地缓存，锁死该身份证
        localStorage.setItem('xf_tested_' + userInfo.idStr, "TRUE");
        
        calcRes();
    } else {
        currIdx++; renderQ();
    }
}

// 综合结算模型
function calcRes() {
    let lieScore = 0, attFail = 0, redTrig = 0, discScore = 0, mathCorrect = 0;
    let mbti = {E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0};

    questions.forEach((q, i) => {
        let a = answers[i];
        if(a === null) return;

        if(q.cat === "lie") lieScore += q.scores[a];
        else if(q.cat === "att") { if(a !== q.correct) attFail++; }
        else if(q.cat === "red") { if(q.scores[a] === 0) redTrig++; }
        else if(q.cat === "disc") discScore += q.scores[a];
        else if(q.cat === "mbti") mbti[q.vals[a]]++;
        else if(q.ans !== undefined) { if(parseInt(q.opts[a]) === q.ans) mathCorrect++; }
    });

    // 纪律分换算为百分制 (14题*5分=70满分)
    let discPct = Math.round((discScore / 70) * 100) || 0;
    
    // MBTI计算
    let type = (mbti.E >= mbti.I ? "E" : "I") + (mbti.S >= mbti.N ? "S" : "N") + (mbti.T >= mbti.F ? "T" : "F") + (mbti.J >= mbti.P ? "J" : "P");

    // 状态判定逻辑
    let status = "测试合格", desc = "该同志心理健康状况良好，纪律潜质符合要求，具备培养价值。", bgClass = "pass";
    let lieLabel = "真实客观", redLabel = "安全", discLabel = `${discPct}分 (良好)`;

    if(attFail > 0) {
        status = "成绩无效"; bgClass = "fail"; desc = "系统检测到考生存在严重的“乱答题”行为（未通过专注度测试）。";
        lieLabel = "涉嫌乱点";
    } else if(lieScore >= 3) {
        status = "成绩无效"; bgClass = "fail"; desc = "防伪装检测未通过。考生刻意规避真实想法，试图迎合“好答案”，成绩不可信。";
        lieLabel = `过度伪装 (掩饰分:${lieScore})`;
    } else if(redTrig > 0) {
        status = "不合格 (预警)"; bgClass = "fail"; desc = "触发压力或情绪极端红线，该同志在面对高压环境时可能有失控风险，不建议录用。";
        redLabel = `触发 ${redTrig} 次危险信号`;
    } else if(discPct < 60) {
        status = "不合格"; bgClass = "fail"; desc = "隐喻投射显示，该同志日常随性散漫，纪律与服从意识较差，难以适应半军事化管理。";
        discLabel = `${discPct}分 (较差)`;
    }

    report = { status, desc, lieLabel, redLabel, discLabel, type, mathCorrect };

    // 渲染结果
    switchScreen('screen-result');
    let banner = document.getElementById('res-banner');
    banner.className = `res-card ${bgClass}`;
    document.getElementById('res-status').textContent = status;
    document.getElementById('res-desc').textContent = desc;

    document.getElementById('val-lie').textContent = lieLabel;
    document.getElementById('val-red').textContent = redLabel;
    document.getElementById('val-disc').textContent = discLabel;
    document.getElementById('val-mbti').textContent = `${type} 型`;
    document.getElementById('val-math').textContent = `${mathCorrect} / 10`;
}
